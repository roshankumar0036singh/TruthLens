version: '3.8'

services:
  db:
    image: ankane/pgvector:latest
    environment:
      POSTGRES_USER: truthlens_user
      POSTGRES_PASSWORD: truthlens_password
      POSTGRES_DB: truthlens_db
    ports:
      - "5432:5432"
    volumes:
      - truthlens_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - truthlens_redisdata:/data
    restart: unless-stopped

volumes:
  truthlens_pgdata:
  truthlens_redisdata:
